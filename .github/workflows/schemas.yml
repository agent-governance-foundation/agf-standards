name: Schema and fixture checks

on:
  push:
    branches: [main]
    paths:
      - "schemas/**"
  pull_request:
    paths:
      - "schemas/**"

jobs:
  kernel-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Validate kernel fixtures against schemas
        run: python3 schemas/kernel/check.py
